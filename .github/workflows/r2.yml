name: Sync Config to Cloudflare R2

on:
  push:
    branches:
      - main

jobs:
  sync:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Create rclone config
        run: |
          mkdir -p ~/.config/rclone

          cat > ~/.config/rclone/rclone.conf <<EOF
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}
          secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
          endpoint = ${{ secrets.R2_ENDPOINT }}
          acl = private
          no_check_bucket = true
          EOF

      - name: Check config folder
        run: |
          echo "Config files:"
          find config -type f

      - name: Sync config folder
        run: |
          rclone sync config r2:${{ secrets.R2_BUCKET }}/config \
            --fast-list \
            --transfers=8 \
            --checkers=8 \
            --s3-upload-concurrency=8 \
            --progress \
            --delete-during \
            -v

      - name: Verify uploaded files
        run: |
          echo "Files in R2:"
          rclone ls r2:${{ secrets.R2_BUCKET }}/config
